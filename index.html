<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kasir Kaboel</title>
<style>
body{font-family:sans-serif;margin:0;padding:10px;background:#f2f2f2}
.wrap{max-width:380px;margin:auto;background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 5px #ccc}
h2{text-align:center;margin:0 0 15px}
input,select,button{width:100%;padding:12px;margin:5px 0;font-size:16px;border:1px solid #ddd;border-radius:6px}
button{background:#16a34a;color:#fff;border:none;font-weight:bold}
.btn-red{background:#dc2626}
.btn-blue{background:#2563eb}
.list{border:1px solid #ddd;border-radius:6px;margin:8px 0;max-height:150px;overflow:auto}
.item{padding:8px;border-bottom:1px solid #eee;display:flex;justify-content:space-between}
.item:last-child{border:none}
.total{font-size:20px;font-weight:bold;text-align:right;margin:10px 0}
.hide{display:none}
.flex{display:flex;gap:5px}
.flex > *{flex:1}
.label{font-size:14px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap" id="loginBox">
  <h2>Kasir Warkop Kaboel</h2>
  <input id="user" placeholder="Nama Kasir" value="kasir1">
  <input id="pass" type="password" placeholder="Password" value="123">
  <button onclick="masuk()">MASUK</button>
</div>

<div class="wrap hide" id="kasirBox">
  <div class="flex">
    <h2 style="margin:0">KABOEL</h2>
    <button class="btn-red" style="flex:.5" onclick="keluar()">Keluar</button>
  </div>
  
  <div class="label">Shift</div>
  <select id="shift">
    <option>Pagi</option><option>Siang</option><option>Sore</option>
  </select>

  <div class="label">Tambah Barang</div>
  <div class="flex">
    <input id="nama" placeholder="Nama">
    <input id="harga" type="number" placeholder="Harga">
  </div>
  <button onclick="tambah()">+ TAMBAH KE DAFTAR</button>

  <div class="label">Keranjang</div>
  <div class="list" id="daftar"></div>
  <div class="total">Total: <span id="total">0</span></div>

  <select id="bayar">
    <option value="Cash">Cash</option>
    <option value="QRIS">QRIS</option>
  </select>
  
  <label><input type="checkbox" id="lunas"> Sudah Bayar</label>
  <button class="btn-blue" onclick="selesai()">SIMPAN & LAPOR WA OWNER</button>
  <button onclick="excel()">DOWNLOAD LAPORAN</button>
</div>

<script>
// KONFIG
const WA = '62895351432524'; // 0895351432524
const EXPIRED = '2026-12-31';
const LISENSI = 'WKP-KBL-01';

// DATA
let DB = JSON.parse(localStorage.getItem('kaboel-simple') || '{"barang":[],"trx":[]}');
let cart = [];

function save(){ localStorage.setItem('kaboel-simple', JSON.stringify(DB)); }

// CEK EXPIRED
if(new Date() > new Date(EXPIRED)){
  document.body.innerHTML = `<div class="wrap"><h2>Lisensi ${LISENSI} Expired</h2>
  <button onclick="window.open('https://wa.me/${WA}?text=Mas mau perpanjang ${LISENSI} 200rb/bulan')">PERPANJANG VIA WA</button></div>`;
}

// LOGIN
function masuk(){
  if(user.value==='kasir1' && pass.value==='123'){
    loginBox.classList.add('hide');
    kasirBox.classList.remove('hide');
    render();
  } else alert('Salah');
}
function keluar(){
  loginBox.classList.remove('hide');
  kasirBox.classList.add('hide');
}

// KASIR
function tambah(){
  const n = nama.value.trim(), h = parseInt(harga.value);
  if(!n||!h) return alert('Isi nama & harga');
  DB.barang.push({id:Date.now(),n,h});
  save(); nama.value='';harga.value=''; 
  cart.push({n,h}); render();
}

function render(){
  daftar.innerHTML = cart.map((i,k)=>`
    <div class="item">
      <span>${i.n} ${i.h}</span>
      <span onclick="cart.splice(${k},1);render()" style="color:red">x</span>
    </div>
  `).join('') || '<div class="item">Kosong</div>';
  total.innerText = cart.reduce((a,b)=>a+b.h,0);
}

function selesai(){
  if(!cart.length) return alert('Keranjang kosong');
  const t = {
    waktu: new Date().toLocaleTimeString('id-ID').slice(0,5),
    shift: shift.value,
    total: cart.reduce((a,b)=>a+b.h,0),
    metode: bayar.value,
    lunas: lunas.checked,
    items: cart.map(i=>i.n).join(', ')
  };
  DB.trx.push(t); save();
  
  const teks = `*KABOEL*%0AJam: ${t.waktu} ${t.shift}%0AItems: ${t.items}%0ATotal: ${t.total}%0A${t.metode} | ${t.lunas?'LUNAS':'BELUM'}%0ALisensi: ${LISENSI}`;
  window.open(`https://wa.me/${WA}?text=${teks}`);
  
  cart=[]; lunas.checked=false; render();
  alert('Tersimpan');
}

function excel(){
  let csv = 'Jam,Shift,Items,Total,Metode,Status\n';
  DB.trx.forEach(t=> csv += `${t.waktu},${t.shift},"${t.items}",${t.total},${t.metode},${t.lunas?'LUNAS':'BELUM'}\n`);
  const a = document.createElement('a');
  a.href = 'data:text/csv,' + encodeURIComponent(csv);
  a.download = 'kaboel.csv'; a.click();
}
</script>
</body>
  </html>
